<!DOCTYPE html>
<!--Declara el tipo de documento. Indica al navegador que usará
 HTML5-->
<html lang="es">
<!--elemento principal del documento HTML.
Lang="es" indica que el contenido esta en español-->
<head> <!--seccion de configuracion del documento-->
    <meta charset="UTF-8">
    <!--Define la codificación de caracteres.
    UTF-8 permite usar correctamente tildes, ñ, simbolos, etc-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Hace que el sitio sea responsive.
    Permite que el diseño se adapte correctamente a celulares y tablets-->
    <title>practicando HTML - img y video</title>
    <!--titulo que aparece en el navegador-->
    <meta name="author" content="Ariel Faunde">
    <!--indica quien creo el sitio web-->
<link rel="stylesheet" href="static/css/style.css">
<!--conexion con hoja CSS de estilos-->
<body>
    <header>
        <h1>Sitio multimedio personal</h1>
    </header>
    <hr> <!--Crea una linea de division-->
    <main> <!--seccion principal del documento-->
        <h2>Mis datos:</h2>
        <p>Nombre: Ariel Faundez<br> <!--br es un salto de linea-->
           Curso 3C
        </p>
        <hr>
        <h2>Galeria multimedia</h2>
        <p>Imagen de ejemplo</p>
        <img src="static/images/imagen1.png" alt="primera imagen"  width="300">
         <img src="static/images/imagen2.png" alt="segunda imagen" width="300">
         <img src="static/images/imagen3.png" alt="tercera imagen" width="300">
         <img src="static/images/imagen4.png" alt="cuarta imagen" width="300">
         <hr>
         <h2>Videos</h2>
         <video width="500" controls>
            <source src="static/videos/videoplayback.mp4" type="video/mp4"></video>
            <video width="500" controls>
            <source src="static/videos/City boy, city boy.mp4" type="video/mp4">
         </video>
        </main> 
        <footer>
            <p style="text-align:center">Todos los derechos reservados
                - <a href="https://es.wikipedia.org/wiki/IShowSpeed"> informacíon</a> <!--Etiqueta <a> para vinculos-->
            </p>
        </footer>
</body>

</head>
</html>
